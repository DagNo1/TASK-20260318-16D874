spring:
  application:
    name: practice-platform
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:practice_platform}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:app}
    password: ${DB_PASSWORD:app123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me-change-me}
    access-token-minutes: 120
  inventory:
    default-threshold: 10
  scheduler:
    reminder-poll-ms: 1000
    checkpoint-auto-save-ms: 30000
    report-timezone: ${REPORT_TIMEZONE:UTC}

logging:
  level:
    org.springframework.security: INFO
