services:
  mysql:
    image: mysql:8.4
    container_name: practice_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: practice_platform
      MYSQL_USER: app
      MYSQL_PASSWORD: app123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    platform: linux/arm64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: practice_backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: practice_platform
      DB_USER: app
      DB_PASSWORD: app123
      JWT_SECRET: change-me-change-me-change-me-change-me-change-me-change-me
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
